name: 'lead_to_cash'
version: '1.0.0'
config-version: 2

profile: 'lead_to_cash'

# Caminhos do projeto
model-paths:    ["models"]
macro-paths:    ["macros"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
analysis-paths: ["analyses"]
snapshot-paths: ["snapshots"]

target-path:  "target"
clean-targets: ["target", "dbt_packages"]

# Configuracao de materializacao por camada (Arquitetura Medallion)
models:
  lead_to_cash:

    staging:
      # Silver: views sao suficientes — evitam duplicacao de dados
      # e sempre refletem o estado mais recente da camada Raw.
      +materialized: view
      +schema: staging       # -> schema 'staging' (via macro generate_schema_name)

    intermediate:
      # Views intermediarias — consumidas apenas pelos marts, sem acesso direto do BI.
      # Ficam no schema padrao (public) sem alias customizado.
      +materialized: view

    marts:
      # Gold: tabelas fisicas para consultas analiticas de alta performance
      # (FastAPI + BI tools consultam direto sem reprocessar JOINs complexos)
      +materialized: table
      # sem +schema customizado -> usa o target.schema do profiles.yml (public)
