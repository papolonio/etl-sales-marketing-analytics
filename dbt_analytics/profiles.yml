lead_to_cash:
  target: dev
  outputs:
    dev:
      type: postgres
      host:     "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port:     "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user:     "{{ env_var('POSTGRES_USER', 'admin') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'admin') }}"
      dbname:   "{{ env_var('POSTGRES_DB', 'data_warehouse') }}"
      schema:   public   # schema padrao para a camada Gold (marts)
      threads:  4
